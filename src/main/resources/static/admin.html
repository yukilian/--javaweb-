<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人事管理系统 - 管理员</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .sidebar {
            width: 200px;
            min-height: 100vh;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 20px 10px;
            position: fixed;
            top: 0; left: 0;
        }
        .sidebar .welcome {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            padding: 10px 0 20px;
        }
        .sidebar .nav-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: #475569;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .sidebar .nav-btn:hover { background: #e2e8f0; color: #1e3a8a; }
        .sidebar .nav-btn.active { background: #dbeafe; color: #1e3a8a; }
        .sidebar .btn-logout { color: #ef4444; }
        .sidebar .btn-logout:hover { background: #fee2e2; }
        .main-content {
            margin-left: 220px;
            padding: 24px;
        }
        .page { display: none; }
        .page.active { display: block; }
        .page-title {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .card { border-radius: 12px; border: 1px solid #e2e8f0; }
        .btn-primary { background-color: #3b82f6; border: none; }
        .btn-primary:hover { background-color: #2563eb; }
        th { color: #1e3a8a; font-weight: 700; background: #f8fafc; }
    </style>
</head>
<body>

<!-- 左侧导航 -->
<div class="sidebar">
    <div class="welcome" id="welcome-label">你好，管理员</div>
    <button class="nav-btn active" id="nav-dept" onclick="switchPage('dept')">部门管理</button>
    <button class="nav-btn" id="nav-emp" onclick="switchPage('emp')">职员管理</button>
    <button class="nav-btn" id="nav-salary" onclick="switchPage('salary')">工资录入</button>
    <button class="nav-btn" id="nav-att" onclick="switchPage('att')">考勤管理</button>
    <div style="flex:1"></div>
    <button class="nav-btn btn-logout mt-5" onclick="handleLogout()">退出登录</button>
</div>

<!-- 右侧内容 -->
<div class="main-content">

    <!-- 部门管理 -->
    <div class="page active" id="page-dept">
        <div class="page-title">部门管理</div>
        <div class="card p-3">
            <table class="table table-hover align-middle" id="dept-table">
                <thead>
                <tr>
                    <th>部门名称</th><th>部门地址</th>
                    <th>部门电话</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="dept-tbody"></tbody>
            </table>
            <button class="btn btn-primary mt-2" onclick="openDeptModal()">+ 新增部门</button>
        </div>
    </div>

    <!-- 职员管理 -->
    <div class="page" id="page-emp">
        <div class="page-title">职员管理</div>
        <div class="card p-3">
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="emp-search" class="form-control w-auto" placeholder="输入姓名搜索...">
                <button class="btn btn-outline-primary" onclick="loadEmployees()">搜索</button>
                <button class="btn btn-outline-secondary" onclick="resetEmpSearch()">重置</button>
            </div>
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>职员编号</th><th>姓名</th><th>性别</th>
                    <th>所属部门</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="emp-tbody"></tbody>
            </table>
            <button class="btn btn-primary mt-2" onclick="openEmpModal()">+ 新增职员</button>
        </div>
    </div>

    <!-- 工资录入 -->
    <div class="page" id="page-salary">
        <div class="page-title">工资录入</div>
        <div class="card p-3">
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="salary-search" class="form-control w-auto" placeholder="姓名...">
                <input type="number" id="salary-month" class="form-control w-auto" placeholder="月份 如202605">
                <button class="btn btn-outline-primary" onclick="loadSalaries()">搜索</button>
            </div>
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>职员编号</th><th>姓名</th><th>部门</th>
                    <th>月份</th><th>实发工资</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="salary-tbody"></tbody>
            </table>
            <button class="btn btn-primary mt-2" onclick="openSalaryModal()">+ 工资录入</button>
        </div>
    </div>

    <!-- 考勤管理 -->
    <div class="page" id="page-att">
        <div class="page-title">考勤管理</div>
        <div class="card p-3">
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="att-search" class="form-control w-auto" placeholder="姓名...">
                <select id="att-status" class="form-select w-auto" onchange="loadAttendances()">
                    <option value="">全部状态</option>
                    <option value="待审核">待审核</option>
                    <option value="已通过">已通过</option>
                    <option value="已驳回">已驳回</option>
                </select>
                <button class="btn btn-outline-primary" onclick="loadAttendances()">搜索</button>
            </div>
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>姓名</th><th>部门</th><th>日期</th>
                    <th>类型</th><th>事由</th><th>状态</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="att-tbody"></tbody>
            </table>
            <button class="btn btn-primary mt-2" onclick="openAttModal()">+ 新增考勤</button>
        </div>
    </div>
</div>

<!-- 部门弹窗 -->
<div class="modal fade" id="deptModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="dept-modal-title">新增部门</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="dept-id">
                <div class="mb-3">
                    <label class="form-label">部门名称 *</label>
                    <input type="text" id="dept-name" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">部门地址</label>
                    <input type="text" id="dept-address" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">部门电话</label>
                    <input type="text" id="dept-phone" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="saveDept()">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- 职员弹窗 -->
<div class="modal fade" id="empModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="emp-modal-title">新增职员</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="emp-edit-id">
                <div class="mb-2">
                    <label class="form-label">职员编号 *</label>
                    <input type="number" id="emp-id" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">姓名 *</label>
                    <input type="text" id="emp-name" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">性别</label>
                    <select id="emp-gender" class="form-select">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label">所属部门 *</label>
                    <select id="emp-dept" class="form-select"></select>
                </div>
                <div class="mb-2">
                    <label class="form-label">职位</label>
                    <input type="text" id="emp-position" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">入职日期</label>
                    <input type="date" id="emp-hire" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">电话</label>
                    <input type="text" id="emp-phone" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="saveEmp()">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- 工资弹窗 -->
<div class="modal fade" id="salaryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="salary-modal-title">工资录入</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="salary-id">
                <div class="mb-2">
                    <label class="form-label">职员</label>
                    <select id="salary-emp" class="form-select"></select>
                </div>
                <div class="mb-2">
                    <label class="form-label">月份 *</label>
                    <input type="number" id="salary-month-input" class="form-control" placeholder="如202605">
                </div>
                <div class="row">
                    <div class="col mb-2">
                        <label class="form-label">基本工资</label>
                        <input type="number" id="sal-base" class="form-control" value="0" oninput="calcNet()">
                    </div>
                    <div class="col mb-2">
                        <label class="form-label">津贴</label>
                        <input type="number" id="sal-allow" class="form-control" value="0" oninput="calcNet()">
                    </div>
                </div>
                <div class="row">
                    <div class="col mb-2">
                        <label class="form-label">税费</label>
                        <input type="number" id="sal-tax" class="form-control" value="0" oninput="calcNet()">
                    </div>
                    <div class="col mb-2">
                        <label class="form-label">保险</label>
                        <input type="number" id="sal-ins" class="form-control" value="0" oninput="calcNet()">
                    </div>
                </div>
                <div class="row">
                    <div class="col mb-2">
                        <label class="form-label">公积金</label>
                        <input type="number" id="sal-fund" class="form-control" value="0" oninput="calcNet()">
                    </div>
                    <div class="col mb-2">
                        <label class="form-label">水费</label>
                        <input type="number" id="sal-water" class="form-control" value="0" oninput="calcNet()">
                    </div>
                </div>
                <div class="row">
                    <div class="col mb-2">
                        <label class="form-label">煤气费</label>
                        <input type="number" id="sal-gas" class="form-control" value="0" oninput="calcNet()">
                    </div>
                    <div class="col mb-2">
                        <label class="form-label">房租</label>
                        <input type="number" id="sal-rent" class="form-control" value="0" oninput="calcNet()">
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">会费</label>
                    <input type="number" id="sal-union" class="form-control" value="0" oninput="calcNet()">
                </div>
                <div class="alert alert-info py-2">
                    实发工资：<strong id="net-salary">0.00</strong> 元
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="saveSalary()">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- 考勤弹窗 -->
<div class="modal fade" id="attModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="att-modal-title">新增考勤</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="att-id">
                <div class="mb-2">
                    <label class="form-label">职员 *</label>
                    <select id="att-emp" class="form-select"></select>
                </div>
                <div class="mb-2">
                    <label class="form-label">日期 *</label>
                    <input type="date" id="att-date" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">考勤类型</label>
                    <select id="att-type" class="form-select">
                        <option>正常</option>
                        <option>加班</option>
                        <option>请假</option>
                        <option>休假</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col mb-2">
                        <label class="form-label">签到时间</label>
                        <input type="time" id="att-in" class="form-control">
                    </div>
                    <div class="col mb-2">
                        <label class="form-label">签退时间</label>
                        <input type="time" id="att-out" class="form-control">
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">事由</label>
                    <input type="text" id="att-reason" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="saveAtt()">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- 考勤审核弹窗 -->
<div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">考勤审核</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="review-att-id">
                <div class="mb-3">
                    <label class="form-label">审核结果</label>
                    <select id="review-status" class="form-select">
                        <option value="待审核">待审核</option>
                        <option value="已通过">已通过</option>
                        <option value="已驳回">已驳回</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="submitReview()">确认</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
