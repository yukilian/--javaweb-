<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人事管理系统 - 部门负责人</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }

        /* ── 侧边栏 ── */
        .sidebar {
            width: 200px;
            min-height: 100vh;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 20px 10px;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar .welcome {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            padding: 10px 0 20px;
            word-break: break-all;
            line-height: 1.4;
        }
        .sidebar .nav-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: #475569;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
        }
        .sidebar .nav-btn:hover { background: #e2e8f0; color: #1e3a8a; }
        .sidebar .nav-btn.active { background: #dbeafe; color: #1e3a8a; }
        .sidebar .nav-divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 8px 0;
        }
        .sidebar .btn-logout { color: #ef4444; margin-top: auto; }
        .sidebar .btn-logout:hover { background: #fee2e2; }

        /* ── 主内容区 ── */
        .main-content { margin-left: 220px; padding: 24px; }
        .page { display: none; }
        .page.active { display: block; }
        .page-title {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* ── 卡片 ── */
        .card { border-radius: 12px; border: 1px solid #e2e8f0; }
        .card-header-label {
            font-size: 14px;
            font-weight: 600;
            color: #1e3a8a;
            padding: 12px 16px 8px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* ── 信息行 ── */
        .info-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #f8fafc;
            gap: 8px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            width: 90px;
            flex-shrink: 0;
            color: #94a3b8;
            font-size: 13px;
        }
        .info-value {
            flex: 1;
            color: #1e293b;
            font-size: 14px;
            font-weight: 500;
        }

        /* ── 表格 ── */
        th { color: #1e3a8a; font-weight: 700; background: #f8fafc; }
        .table > :not(caption) > * > * { padding: 10px 12px; }

        /* ── 按钮 ── */
        .btn-primary { background-color: #3b82f6; border: none; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-outline-edit {
            background: #fff;
            color: #475569;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 12px;
            padding: 3px 10px;
        }
        .btn-outline-edit:hover { background: #f1f5f9; border-color: #94a3b8; }

        /* ── 状态徽章 ── */
        .badge-pending  { background:#fef3c7; color:#92400e; }
        .badge-approved { background:#d1fae5; color:#065f46; }
        .badge-rejected { background:#fee2e2; color:#991b1b; }

        /* ── 部门管理专属：负责人角色标签 ── */
        .role-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #dbeafe;
            color: #1e3a8a;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ══ 左侧导航 ══ -->
<div class="sidebar">
    <div class="welcome" id="welcome-label">你好，负责人</div>

    <!-- 个人功能（与职员相同） -->
    <button class="nav-btn active" id="nav-info"       onclick="switchPage('info')">个人信息管理</button>
    <button class="nav-btn"        id="nav-salary"     onclick="switchPage('salary')">个人工资管理</button>
    <button class="nav-btn"        id="nav-attendance" onclick="switchPage('attendance')">个人考勤历史</button>
    <button class="nav-btn"        id="nav-security"   onclick="switchPage('security')">账号安全管理</button>

    <hr class="nav-divider">

    <!-- 负责人专属 -->
    <button class="nav-btn" id="nav-dept" onclick="switchPage('dept')">部门管理</button>

    <button class="nav-btn btn-logout" onclick="handleLogout()">退出登录</button>
</div>

<!-- ══ 右侧内容 ══ -->
<div class="main-content">

    <!-- ── Page：个人信息管理 ── -->
    <div class="page active" id="page-info">
        <div class="page-title">个人信息管理</div>
        <div class="card mb-3">
            <div class="card-header-label">基本身份资料</div>
            <div class="info-row">
                <span class="info-label">职员编号</span>
                <span class="info-value" id="val-empid">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">姓名</span>
                <span class="info-value" id="val-name">-</span>
                <button class="btn-outline-edit" onclick="openEditModal('empName','姓名','text')">编辑</button>
            </div>
            <div class="info-row">
                <span class="info-label">性别</span>
                <span class="info-value" id="val-gender">-</span>
                <button class="btn-outline-edit" onclick="openEditModal('gender','性别','gender')">编辑</button>
            </div>
            <div class="info-row">
                <span class="info-label">出生日期</span>
                <span class="info-value" id="val-birth">-</span>
                <button class="btn-outline-edit" onclick="openEditModal('birthDate','出生日期','date')">编辑</button>
            </div>
        </div>
        <div class="card">
            <div class="card-header-label">工作与联系信息</div>
            <div class="info-row">
                <span class="info-label">所属部门</span>
                <span class="info-value" id="val-dept-name">-</span>
                <span class="role-badge">部门负责人</span>
            </div>
            <div class="info-row">
                <span class="info-label">职位</span>
                <span class="info-value" id="val-position">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">入职日期</span>
                <span class="info-value" id="val-hire">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">电话号码</span>
                <span class="info-value" id="val-phone">-</span>
                <button class="btn-outline-edit" onclick="openEditModal('phone','电话号码','text')">编辑</button>
            </div>
            <div class="info-row">
                <span class="info-label">家庭地址</span>
                <span class="info-value" id="val-addr">-</span>
                <button class="btn-outline-edit" onclick="openEditModal('address','家庭地址','text')">编辑</button>
            </div>
        </div>
    </div>

    <!-- ── Page：个人工资管理 ── -->
    <div class="page" id="page-salary">
        <div class="page-title">个人工资管理</div>
        <div class="card p-3">
            <div class="d-flex gap-2 mb-3 align-items-center">
                <label class="text-secondary small mb-0">月份筛选：</label>
                <input type="text" id="salary-month-filter" class="form-control w-auto"
                       placeholder="如：202605（留空显示全部）">
                <button class="btn btn-outline-primary btn-sm" onclick="loadSalary()">查询</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-2">
                    <thead>
                    <tr>
                        <th>月份</th><th>基本工资</th><th>津贴</th>
                        <th>税费</th><th>保险</th><th>公积金</th>
                        <th>其他扣款</th><th>实发工资</th><th>详情</th>
                    </tr>
                    </thead>
                    <tbody id="salary-tbody"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-2">
                <button class="btn btn-outline-secondary btn-sm" onclick="exportPersonalSalary()">导出 Excel</button>
            </div>
        </div>
    </div>

    <!-- ── Page：个人考勤历史 ── -->
    <div class="page" id="page-attendance">
        <div class="page-title">个人考勤历史</div>
        <div class="card p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>日期</th><th>考勤类型</th>
                        <th>签到时间</th><th>签退时间</th><th>审核状态</th>
                    </tr>
                    </thead>
                    <tbody id="att-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── Page：账号安全管理 ── -->
    <div class="page" id="page-security">
        <div class="page-title">账号安全管理</div>
        <div class="card mb-3 p-3">
            <div class="card-header-label" style="padding:0 0 10px; border-bottom:1px solid #f1f5f9; margin-bottom:14px;">密码修改</div>
            <div class="row g-3" style="max-width:480px;">
                <div class="col-12">
                    <label class="form-label small text-secondary">当前密码</label>
                    <input type="password" id="old-pwd" class="form-control" placeholder="请输入当前密码">
                </div>
                <div class="col-12">
                    <label class="form-label small text-secondary">新密码</label>
                    <input type="password" id="new-pwd" class="form-control" placeholder="请输入新密码（至少4位）">
                </div>
                <div class="col-12">
                    <label class="form-label small text-secondary">确认新密码</label>
                    <input type="password" id="confirm-pwd" class="form-control" placeholder="再次输入新密码">
                </div>
                <div class="col-12">
                    <div id="pwd-msg" class="small mb-2" style="display:none;"></div>
                    <button class="btn btn-primary btn-sm" onclick="changePassword()">修改密码</button>
                </div>
            </div>
        </div>
        <div class="card p-3">
            <div class="card-header-label" style="padding:0 0 10px; border-bottom:1px solid #f1f5f9; margin-bottom:14px;">密保问题</div>
            <div class="info-row" style="padding:0 0 10px;">
                <span class="info-label">密保问题</span>
                <span class="info-value" id="val-sec-question">（未设置）</span>
            </div>
            <div class="info-row" style="padding:8px 0 0;">
                <span class="info-label">密保答案</span>
                <span class="info-value" id="val-sec-answer">（未设置）</span>
                <button class="btn-outline-edit" onclick="openSecurityModal()">编辑密保</button>
            </div>
        </div>
    </div>

    <!-- ── Page：部门管理（负责人专属） ── -->
    <div class="page" id="page-dept">
        <div class="page-title">
            部门管理（本部门）
            <span class="fs-6 fw-normal text-secondary ms-2" id="dept-title-name"></span>
        </div>

        <!-- 汇总卡片 -->
        <div class="row g-3 mb-4" id="dept-summary-cards">
            <div class="col-6 col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-secondary" style="font-size:12px;">部门人数</div>
                    <div class="fw-bold fs-4 text-primary" id="summary-count">-</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-secondary" style="font-size:12px;">本月人均实发</div>
                    <div class="fw-bold fs-4 text-success" id="summary-avg">-</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-secondary" style="font-size:12px;">本月工资总额</div>
                    <div class="fw-bold fs-4" id="summary-total">-</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card p-3 text-center">
                    <div class="text-secondary" style="font-size:12px;">最新月份</div>
                    <div class="fw-bold fs-4 text-secondary" id="summary-month">-</div>
                </div>
            </div>
        </div>

        <!-- 职员列表 -->
        <div class="card p-3">
            <div class="d-flex gap-2 mb-3 align-items-center">
                <input type="text" id="dept-emp-search" class="form-control w-auto"
                       placeholder="输入职员姓名搜索...">
                <button class="btn btn-outline-primary btn-sm" onclick="searchDeptEmp()">搜索</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="resetDeptSearch()">重置</button>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="exportPayroll()">导出工资发放表</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="exportSummary()">导出工资汇总表</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>职员编号</th><th>姓名</th><th>性别</th>
                        <th>职位</th><th>最新月份实发工资</th><th>工资详情</th>
                    </tr>
                    </thead>
                    <tbody id="dept-emp-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div><!-- /main-content -->


<!-- ══ 弹窗：单字段编辑 ══ -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="edit-modal-title">修改</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-field-key">
                <div id="edit-text-wrap">
                    <input type="text" id="edit-text-val" class="form-control">
                </div>
                <div id="edit-date-wrap" style="display:none;">
                    <input type="date" id="edit-date-val" class="form-control">
                </div>
                <div id="edit-gender-wrap" style="display:none;">
                    <select id="edit-gender-val" class="form-select">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary btn-sm" onclick="saveField()">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- ══ 弹窗：工资详情 ══ -->
<div class="modal fade" id="salaryDetailModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">工资详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="salary-detail-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- ══ 弹窗：密保编辑 ══ -->
<div class="modal fade" id="securityModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑密保</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small text-secondary">密保问题</label>
                    <input type="text" id="sec-question" class="form-control" placeholder="请输入密保问题">
                </div>
                <div class="mb-3">
                    <label class="form-label small text-secondary">原答案验证（首次设置可留空）</label>
                    <input type="text" id="sec-old-answer" class="form-control" placeholder="请输入原密保答案">
                </div>
                <div class="mb-3">
                    <label class="form-label small text-secondary">新答案</label>
                    <input type="text" id="sec-new-answer" class="form-control" placeholder="请输入新密保答案">
                </div>
                <div id="sec-msg" class="small" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary btn-sm" onclick="saveSecurity()">确认</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/manager.js"></script>
</body>
</html>
