<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人事管理系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 420px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-title {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 26px;
        }
        .btn-login {
            background-color: #3b82f6;
            border: none;
            font-weight: 600;
        }
        .btn-login:hover {
            background-color: #2563eb;
        }
        .forget-link {
            color: #94a3b8;
            font-size: 13px;
            text-decoration: none;
        }
        .forget-link:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="card-body">
        <h2 class="login-title text-center mb-4">人事管理系统</h2>

        <div class="mb-3">
            <label class="form-label fw-semibold">账号</label>
            <input type="text" id="username" class="form-control form-control-lg"
                   placeholder="请输入账号">
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">密码</label>
            <input type="password" id="password" class="form-control form-control-lg"
                   placeholder="请输入密码">
        </div>

        <div id="error-msg" class="text-danger small mb-2" style="display:none;"></div>

        <button class="btn btn-login btn-primary w-100 py-2 mt-2"
                onclick="handleLogin()">登 录</button>

        <div class="text-center mt-3">
            <a href="forget.html" class="forget-link">忘记密码？</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
