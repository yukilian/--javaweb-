spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hrsystem?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd
    time-zone: Asia/Shanghai

server:
  port: 8081